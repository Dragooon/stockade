# Stockade — Proxy Configuration (credential injection + network policy)
# Copy to ~/.stockade/proxy.yaml and customize.

proxy:
  # Bind address. Use "127.0.0.1" (default) to restrict to local access.
  # Use "0.0.0.0" if Docker containers need to reach the proxy via
  # host.docker.internal (pair with firewall rules — see scripts/setup-firewall.ps1).
  host: "127.0.0.1"

  # Credential provider — CLI command templates.
  # Supports any secret manager: 1Password, Bitwarden, AWS SM, files, etc.
  # {key} is replaced with the credential name, {value} with the secret.
  #
  # `overrides` let you route specific keys to different backends.
  # First match wins; unmatched keys fall through to the default `read`.
  provider:
    read:  "cat ~/.stockade/secrets/{key}"
    write: "mkdir -p $(dirname ~/.stockade/secrets/{key}) && printf '%s' '{value}' > ~/.stockade/secrets/{key}"
    update: "printf '%s' '{value}' > ~/.stockade/secrets/{key}"
    cache_ttl: 60
    overrides:
      # Claude Code stores its OAuth token in ~/.claude/.credentials.json.
      # This override reads it directly so agents can call the Anthropic API.
      - match: "claude-oauth-token"
        read: "python3 -c \"import json,os; d=json.load(open(os.path.expanduser('~/.claude/.credentials.json'))); print(d['claudeAiOauth']['accessToken'],end='')\""
        cache_ttl: 0  # OAuth tokens are refreshed by CLI — never cache

      # 1Password example:
      # - match: "op:*"
      #   read: "op read op://{key}"

  # Network policy — deny by default, allowlist specific hosts.
  # Applies to all container traffic (HTTP and SSH).
  policy:
    default: deny
    rules:
      - host: "api.anthropic.com"
        action: allow
      # Claude Code OAuth token refresh and auth metadata
      - host: "platform.claude.com"
        action: allow
      - host: "claude.ai"
        action: allow
      - host: "127.0.0.1"
        action: allow
      - host: "localhost"
        action: allow
      # Add more hosts as needed:
      # - host: "api.github.com"
      #   action: allow

  http:
    port: 10255
    tls:
      ca_cert: proxy/ca.crt
      ca_key:  proxy/ca.key
    strip_headers:
      - authorization
      - x-api-key
      - proxy-authorization
    routes:
      - host: "api.anthropic.com"
        credential: claude-oauth-token
        inject:
          header: authorization
          format: "Bearer {value}"

  ssh:
    port: 10022
    ca_key: proxy/ssh-ca
    routes: []

  gateway:
    port: 10256
    token_ttl: 86400
