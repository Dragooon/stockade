# Stockade — Example Configuration (sandboxed by default)
# Copy to ~/.stockade/config.yaml and customize for your setup.
# All agents run in containers by default. No secrets in this file.
# Paths starting with ~/ are expanded to the user's home directory.

agents:
  main:
    model: claude-sonnet-4-6
    effort: high
    system_mode: append
    system: |
      You are the orchestrator agent. You handle conversation with the user
      and delegate work to sub-agents. You synthesise results and make decisions.

      Sub-agents available via ask_agent:
      - researcher: research, lookups, fact-checking (sandboxed)
      - engineer: coding, testing, debugging (sandboxed)

      Delegation rules:
      - Research, docs, lookups → researcher
      - Code changes, tests, debugging → engineer
      - Direct conversation, orchestration, final synthesis → you
    tools:
      - Bash
      - Read
      - Write
      - Edit
      - Glob
      - Grep
    subagents:
      - researcher
      - engineer
    sandboxed: true
    container:
      memory: 1g
      cpus: 2.0
    permissions:
      - "deny:Write(/config/**)"
      - "deny:Edit(/config/**)"
      - "allow:*"

  researcher:
    model: claude-haiku-4-5-20251001
    effort: low
    system_mode: append
    system: |
      You are a research agent. Quick lookups to deep investigations.
      Always include source URLs. Verify claims through multiple sources.
    tools:
      - Bash
      - Read
      - WebSearch
      - WebFetch
    sandboxed: true
    container:
      memory: 512m
      cpus: 1.0
    permissions:
      - "allow:Read"
      - "allow:WebSearch"
      - "allow:WebFetch"
      - "allow:Bash(curl *)"
      - "allow:Bash(git log *)"

  engineer:
    model: claude-sonnet-4-6
    effort: high
    system_mode: append
    system: |
      You are a software engineering agent. Read spec, plan, implement, test,
      iterate until green. Never submit untested code.
    tools:
      - Bash
      - Read
      - Write
      - Edit
      - Glob
      - Grep
    sandboxed: true
    container:
      memory: 2g
      cpus: 2.0
    permissions:
      - "deny:Write(/config/**)"
      - "deny:Edit(/config/**)"
      - "allow:*"

  # Gatekeeper agent — lightweight risk classifier for tool invocations.
  # Referenced by the gatekeeper section below. Customize the system prompt
  # to adjust risk classification for your environment.
  gatekeeper:
    model: claude-haiku-4-5-20251001
    effort: low
    system_mode: replace
    system: |
      You are a security gatekeeper for the Stockade agent platform. You assess the risk
      level of tool invocations that AI agents want to execute.

      You will receive a tool name and its arguments. Respond with ONLY a JSON object:

      {"risk": "low|medium|high|critical", "summary": "...", "reasoning": "..."}

      ## Classification Rules

      ### CRITICAL
      - Modifying auth/credentials, secrets, or RBAC configuration
      - Destructive git operations (force push, reset --hard)
      - rm -rf or recursive deletion of important directories
      - Sending credentials or secrets to external endpoints

      ### HIGH (default for config and network)
      - ANY write or edit to platform config files (config.yaml, proxy.yaml, ~/.stockade/)
      - ANY outbound network request (curl, wget, fetch to external URLs)
      - ANY WebSearch or WebFetch invocation
      - Running unfamiliar or obfuscated scripts
      - git push (any variant)
      - Writing to paths outside the agent's own workspace

      ### MEDIUM (default for writes and commands)
      - Writing or editing files within expected project directories
      - Running build, test, or lint commands
      - Installing dev dependencies
      - git commit, git checkout, git branch operations

      ### LOW
      - Reading files, listing files, searching content
      - git status, git log, git diff
      - Non-destructive Bash commands (echo, pwd, which)

      Key principles:
      1. Config changes are ALWAYS high or critical.
      2. Anything that reaches the network is HIGH by default.
      3. When in doubt, classify higher.
      4. Obfuscated commands (base64, eval, encoded strings) are always HIGH+.
    tools: []
    sandboxed: false
    memory:
      enabled: false

channels:
  terminal:
    enabled: true
    agent: main

  # Uncomment to enable Discord:
  # discord:
  #   enabled: true
  #   token: ${DISCORD_TOKEN}
  #   bindings:
  #     - server: "YOUR_SERVER_ID"
  #       agent: main
  #       channels: "*"

rbac:
  roles:
    owner:
      permissions:
        - "agent:*"
        - "tool:*"
    user:
      permissions:
        - "agent:main"
      deny:
        - "tool:Bash"
        - "tool:Write"
        - "tool:Edit"
  users:
    # Add your user here:
    # your-name:
    #   roles:
    #     - owner
    #   identities:
    #     terminal: "your-os-username"
    #     discord: "your-discord-user-id"

containers:
  network: stockade-net
  proxy_host: host.docker.internal
  port_range: [3001, 3099]
  base_dockerfile: ./packages/worker/Dockerfile
  build_context: .
  health_check:
    interval_ms: 500
    timeout_ms: 30000
    retries: 3
  defaults:
    memory: 1g
    cpus: 1.0
  max_age_hours: 0
  max_concurrent: 5
  proxy_ca_cert: ~/.stockade/proxy/ca.crt

# Gatekeeper — AI risk review for tool invocations that hit `ask` rules.
# When enabled, tools matching `ask:` permissions are reviewed before prompting
# the user. Low-risk actions are auto-approved; higher risk requires approval.
gatekeeper:
  enabled: true
  agent: gatekeeper
  auto_approve_risk: low
