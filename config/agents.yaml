agents:
  main:
    model: claude-sonnet-4-20250514
    provider: anthropic
    system: |
      You are a helpful assistant with access to shell commands and file operations.
    tools:
      - bash
      - file-read
      - file-write
      - file-edit
    sandbox: false
    lifecycle: persistent
    port: 3001
    memory:
      dir: ./data/agents/main/memory
