<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #e0e0e0;
      --accent: #4fc3f7;
      --muted: #888;
      --border: #222;
      --code-bg: #141414;
      --max-w: 720px;
      --warn: #e6a700;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      padding: 0 20px;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .container { max-width: var(--max-w); margin: 0 auto; padding: 40px 0 60px; }

    /* Nav */
    nav { display: flex; gap: 20px; margin-bottom: 40px; font-size: 0.9rem; flex-wrap: wrap; }
    nav a { color: var(--muted); }
    nav a:hover, nav a.active { color: var(--accent); }

    /* Typography */
    h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
    h2 { font-size: 1.2rem; font-weight: 600; margin: 40px 0 16px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    h3 { font-size: 1rem; font-weight: 600; margin: 24px 0 8px; color: var(--accent); }
    p { margin: 8px 0; }
    ul, ol { margin: 8px 0 8px 24px; }
    li { margin: 4px 0; }
    strong { font-weight: 600; }
    hr { border: none; border-top: 1px solid var(--border); margin: 40px 0; }

    /* Code */
    pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      font-size: 0.85rem;
      line-height: 1.5;
      margin: 12px 0;
    }
    code { background: var(--code-bg); padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
    pre code { background: none; padding: 0; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin: 16px 0; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--accent); font-weight: 600; }

    /* Blockquotes (used for warnings/notes) */
    blockquote {
      background: var(--code-bg);
      border-left: 3px solid var(--warn);
      padding: 12px 16px;
      margin: 16px 0;
      font-size: 0.9rem;
    }
    blockquote p { margin: 0; }

    /* Footer */
    footer {
      margin-top: 60px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/quickstart' | relative_url }}">Quick Start</a>
      <a href="{{ '/architecture' | relative_url }}">Architecture</a>
      <a href="{{ '/configuration' | relative_url }}">Configuration</a>
      <a href="https://github.com/Dragooon/stockade">GitHub</a>
    </nav>
    {{ content }}
    <footer>Stockade — MIT License</footer>
  </div>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'dark' });
  </script>
</body>
</html>
